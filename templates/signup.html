
{% extends 'base.html' %}
{% block content %}
<h1>Create Account</h1>
<!-- <p class="notice">Passwords are stored in plaintext; classes are case sensitive; minimal validation.</p> -->
<form method="post">
  <label>Name</label>
  <input type="text" name="name" required>
  <label>Username</label>
  <input type="text" name="username" required>
  <label>Password</label>
  <input type="password" name="password" required>
  <label>Classes (comma-separated, case-sensitive)</label>
  <input type="text" name="classes" placeholder="INFO1111,MATH1001">
  <label>Date of Birth</label>
  <input type="text" name="dob" placeholder="YYYY-MM-DD">
  <label>Address</label>
  <input type="text" name="address" placeholder="123 Example St">
  <label>Availability (one per line, e.g., Mon 10:00-12:00)</label>
  <textarea name="availability" rows="4"></textarea>
  <button type="submit">Create</button>
</form>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
{% endblock %}
